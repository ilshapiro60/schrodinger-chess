# Codemagic uses this file when it exists on the checked-out branch (Workflow Editor is ignored).
#
# Code signing: Team → Environment variable group `appstore_credentials` must include:
#   APP_STORE_CONNECT_PRIVATE_KEY, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID
# If `fetch-signing-files --create` fails to create a certificate, add CERTIFICATE_PRIVATE_KEY
# (distribution cert RSA key) — see https://docs.codemagic.io/yaml-code-signing/alternative-code-signing-methods/
#
# Publishing: same API key vars work for App Store Connect upload.

workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: com.pryroinc.schrodingerchess
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Initialize keychain for code signing
        script: keychain initialize
      - name: Fetch / create App Store signing cert and provisioning profile
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Apply provisioning profiles to Xcode project
        script: xcode-project use-profiles
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods
        script: cd ios && pod install
      - name: Build IPA (CFBundleVersion from pubspec +N)
        script: bash scripts/flutter_build_ipa.sh
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
