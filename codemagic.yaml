# Codemagic YAML (Workflow Editor is ignored when this file is on the branch.)
#
# ── iOS signing (stable path): one-time setup in Codemagic, then simple builds ──
#
# 1. Codemagic → Team settings → Integrations → Developer Portal (App Store Connect API key).
#    Same API key style as publishing (App Manager access is OK).
#
# 2. Codemagic → Team settings → codemagic.yaml settings → Code signing identities
#    • iOS certificates → Fetch certificate OR upload Apple Distribution .p12
#    • iOS provisioning profiles → Fetch profiles → App Store profile for
#      com.pryroinc.schrodingerchess
#
# This workflow matches those stored files to the bundle id (no CLI --create,
# no CERTIFICATE_PRIVATE_KEY).
#
# Publishing: env group appstore_credentials needs APP_STORE_CONNECT_PRIVATE_KEY,
# APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID

workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pryroinc.schrodingerchess
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Apply code signing to Xcode (Team Code signing identities)
        script: xcode-project use-profiles
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods
        script: cd ios && pod install
      - name: Build IPA (CFBundleVersion from pubspec)
        script: bash scripts/flutter_build_ipa.sh
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
