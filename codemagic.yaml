# Codemagic uses this file when it exists on the checked-out branch (Workflow Editor is ignored).
# App Store Connect API key is loaded from the 'appstore_credentials' env-var group
# (set in Codemagic → schrodinger-chess → Environment variables).

workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pryroinc.schrodingerchess
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing for Xcode
        script: xcode-project use-profiles
      - name: Flutter pub get
        script: flutter pub get
      - name: CocoaPods
        script: cd ios && pod install
      - name: Build IPA (CFBundleVersion from pubspec +N)
        script: bash scripts/flutter_build_ipa.sh
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false